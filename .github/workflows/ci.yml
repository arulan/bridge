name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  checks:
    name: Clippy & Test
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-nightly
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - name: Provision build environment
        run: |
          flatpak remote-add --if-not-exists --user \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --disable-rofiles-fuse --force-clean \
            --keep-build-dirs --install-deps-from=flathub --stop-at=dashboard \
            _build io.github.arulan.Dashboard-dev.json
      - name: Clippy
        run: |
          flatpak-builder --run _build io.github.arulan.Dashboard-dev.json \
            cargo clippy --all-targets -- -D warnings
      - name: Test
        run: |
          flatpak-builder --run _build io.github.arulan.Dashboard-dev.json \
            cargo test

  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-nightly
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dashboard.flatpak
          manifest-path: io.github.arulan.Dashboard-dev.json
          cache-key: flatpak-builder-${{ github.sha }}
      - name: Install flatpak-builder-lint
        run: |
          flatpak remote-add --if-not-exists --user \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.flatpak.Builder
      - name: Lint manifest
        run: |
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
            manifest io.github.arulan.Dashboard.json
      - name: Lint repo
        run: |
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
            repo repo
