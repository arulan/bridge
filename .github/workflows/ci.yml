name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  checks:
    name: Clippy & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - name: Provision build environment
        run: |
          flatpak remote-add --if-not-exists --user \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --disable-rofiles-fuse --force-clean \
            --keep-build-dirs --install-deps-from=flathub --stop-at=bridge \
            _build io.github.arulan.Bridge-dev.json
      - name: Clippy
        run: |
          flatpak-builder --run _build io.github.arulan.Bridge-dev.json \
            sh -c 'export CARGO_HOME=/run/build/bridge/cargo CARGO_TARGET_DIR=/run/build/bridge/target && cargo clippy --all-targets -- -D warnings'
      - name: Test
        run: |
          flatpak-builder --run _build io.github.arulan.Bridge-dev.json \
            sh -c 'export CARGO_HOME=/run/build/bridge/cargo CARGO_TARGET_DIR=/run/build/bridge/target && cargo test'

  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v5
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: bridge.flatpak
          manifest-path: io.github.arulan.Bridge-dev.json
          cache-key: flatpak-builder-${{ github.sha }}
